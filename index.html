<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AB Absensi Online</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      margin: 0; padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      border-top: 5px solid #800000;
      margin-bottom: 15px;
    }
    select, button, input[type="date"] {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button { background: #800000; color: white; font-weight: bold; border: none; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .status-container { display: flex; gap: 10px; margin-top: 10px; }
    .status-opt {
      flex: 1; padding: 10px;
      border: 2px solid #ffcccc;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      color: #800000;
    }
    .status-opt.active { background: #800000; color: white; border-color: #800000; }

    #previewBox {
      width: 100%;
      aspect-ratio: 3/4;
      border: 2px dashed #800000;
      border-radius: 10px;
      margin-top: 15px;
      background: #fff5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }
    #imgPreview { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 10px; }
    #previewText { text-align: center; color: #800000; padding: 16px; }
    #previewText span { font-size: 48px; display: block; margin-bottom: 8px; }
    #previewText small { color: #a00; font-size: 12px; }
    #btnUlang { display: none; background: #555; margin-top: 8px; }
    #gpsStatus { font-size: 12px; text-align: center; margin-top: 6px; min-height: 18px; color: #555; }
    #msg { text-align: center; margin-top: 10px; font-weight: bold; }

    #loadingOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }
    #loadingOverlay.show { display: flex; }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #fff3;
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .table-res { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
    .table-res th, .table-res td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    .table-res tfoot td { font-weight: bold; background: #fff5f5; }
  </style>
</head>
<body>

<!-- Loading overlay saat kirim data -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">Mengirim data...</div>
</div>

<!-- KARTU ABSENSI -->
<div class="card">
  <h2 style="text-align:center;color:#800000;margin:0 0 5px;">AB ABSENSI</h2>

  <select id="pilihOutlet" onchange="updateStaff()">
    <option value="">&#128205; Pilih Lokasi Outlet</option>
  </select>

  <select id="namaStaff">
    <option value="">&#128100; Pilih Nama</option>
  </select>

  <div class="status-container">
    <label class="status-opt active" id="optHadir"  onclick="pilihStatus('HADIR')">&#9989; HADIR</label>
    <label class="status-opt"        id="optPulang" onclick="pilihStatus('PULANG')">&#127968; PULANG</label>
  </div>

  <!--
    Kunci solusi:
    - Halaman ini di-host di GitHub Pages (bukan Google Apps Script iframe)
    - input[capture="user"] berjalan di tab browser penuh = tidak crash di Android 12
    - Backend tetap Apps Script yang sama via fetch() API
  -->
  <input type="file" id="inputKamera" accept="image/*" capture="user" style="display:none">

  <div id="previewBox" onclick="bukaKamera()">
    <img id="imgPreview" alt="preview">
    <div id="previewText">
      <span>&#128247;</span>
      <b>KETUK UNTUK SELFIE</b>
      <small>Kamera depan akan terbuka</small>
    </div>
  </div>

  <button id="btnUlang" onclick="resetFoto()">&#8634; ULANGI FOTO</button>

  <div id="gpsStatus">&#128225; Menunggu GPS...</div>
  <button id="btnKirim" onclick="submitAbsensi()">KIRIM ABSENSI</button>
  <div id="msg"></div>
</div>

<!-- KARTU LAPORAN -->
<div class="card">
  <h3 style="text-align:center;margin:0 0 5px;">&#128202; REKAP LAPORAN NBM</h3>
  <div class="date-row">
    <div><label style="font-size:11px;color:#555;">MULAI</label>  <input type="date" id="tglMulai"></div>
    <div><label style="font-size:11px;color:#555;">SAMPAI</label> <input type="date" id="tglSelesai"></div>
  </div>
  <select id="filterOutletLaporan">
    <option value="">&#127970; Semua Outlet</option>
    <option value="Central Kitchen">Central Kitchen</option>
    <option value="Serpong">Serpong</option>
    <option value="Sentul">Sentul</option>
  </select>
  <button onclick="buatLaporan()" style="background:#444;">TAMPILKAN REKAP</button>
  <div id="hasilLaporan" style="overflow-x:auto;"></div>
</div>

<script>
// ================================================================
// GANTI URL INI dengan URL Apps Script Anda setelah deploy ulang
// ================================================================
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtmpwijI0kj8dDQRkorq16hT_gGVnPtiaOXI4AsWOYmMfnhyxtCYOxTEDLQ_dPV-NJQw/exec";
// ================================================================

var base64Foto   = null;
var statusAbsen  = "HADIR";
var koordinatGPS = null;
var gpsLoading   = false;

var outSelect   = document.getElementById('pilihOutlet');
var namaSelect  = document.getElementById('namaStaff');
var msg         = document.getElementById('msg');
var gpsStatus   = document.getElementById('gpsStatus');
var btnKirim    = document.getElementById('btnKirim');
var imgPreview  = document.getElementById('imgPreview');
var previewText = document.getElementById('previewText');
var btnUlang    = document.getElementById('btnUlang');

/* ── Init ───────────────────────────────────────────────────── */
window.onload = function () {
  apiFetch({ action: "getListOutlet" }, function (outlets) {
    outSelect.innerHTML = '<option value="">&#128205; Pilih Lokasi Outlet</option>';
    outlets.forEach(function (o) {
      var opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      outSelect.appendChild(opt);
    });
  });

  document.getElementById('inputKamera').addEventListener('change', function () {
    handleFile(this);
  });

  ambilGPSBackground();
};

/* ── API fetch ke Apps Script ───────────────────────────────── */
// Semua komunikasi ke backend lewat sini
function apiFetch(params, onSuccess, onError) {
  var url = APPS_SCRIPT_URL + "?" + Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
  }).join("&");

  fetch(url, { redirect: "follow" })
    .then(function (r) { return r.json(); })
    .then(function (data) { if (onSuccess) onSuccess(data); })
    .catch(function (e) { if (onError) onError(e); else console.error(e); });
}

function apiPost(payload, onSuccess, onError) {
  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
    .then(function (r) { return r.json(); })
    .then(function (data) { if (onSuccess) onSuccess(data); })
    .catch(function (e) { if (onError) onError(e); else console.error(e); });
}

/* ── Status & Staff ─────────────────────────────────────────── */
function pilihStatus(s) {
  statusAbsen = s;
  document.getElementById('optHadir').classList.toggle('active',  s === 'HADIR');
  document.getElementById('optPulang').classList.toggle('active', s === 'PULANG');
}

function updateStaff() {
  var outlet = outSelect.value;
  if (!outlet) return;
  namaSelect.innerHTML = '<option>Memuat...</option>';
  apiFetch({ action: "getStaffByOutlet", outlet: outlet }, function (names) {
    namaSelect.innerHTML = '<option value="">&#128100; Pilih Nama</option>';
    names.forEach(function (n) {
      var opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      namaSelect.appendChild(opt);
    });
  }, function () {
    namaSelect.innerHTML = '<option value="">&#9888; Gagal memuat</option>';
  });
}

/* ── Kamera ─────────────────────────────────────────────────── */
function bukaKamera() {
  if (base64Foto) return;
  document.getElementById('inputKamera').click();
}

function resetFoto() {
  base64Foto               = null;
  imgPreview.style.display = 'none';
  imgPreview.src           = '';
  previewText.style.display= 'flex';
  btnUlang.style.display   = 'none';
}

function handleFile(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function (e) {
    var img = new Image();
    img.onload = function () {
      var maxW   = 1280;
      var ratio  = Math.min(1, maxW / img.width);
      var canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      prosesWatermark(canvas);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
  input.value = '';
}

function prosesWatermark(canvas) {
  var ctx    = canvas.getContext('2d');
  var nama   = namaSelect.value || "-";
  var outlet = outSelect.value  || "-";
  var status = statusAbsen;
  var now    = new Date();
  var jam    = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  var tgl    = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });

  var baris = [
    "AB ABSENSI ONLINE",
    status + "  \u2014  " + outlet,
    nama,
    tgl + "   " + jam
  ];

  var fontSize   = Math.max(14, Math.round(canvas.width / 26));
  var padding    = Math.round(fontSize * 0.65);
  var lineHeight = fontSize + padding;
  var boxH       = lineHeight * baris.length + padding * 2;
  var boxY       = canvas.height - boxH;

  ctx.fillStyle = 'rgba(0,0,0,0.60)';
  ctx.fillRect(0, boxY, canvas.width, boxH);
  ctx.fillStyle = '#800000';
  ctx.fillRect(0, boxY, canvas.width, Math.max(3, Math.round(fontSize * 0.2)));
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';

  baris.forEach(function (teks, i) {
    var y = boxY + padding + lineHeight * i;
    if (i === 0) {
      ctx.font = 'bold ' + Math.round(fontSize * 1.05) + 'px sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillText(teks, padding+1, y+1);
      ctx.fillStyle = '#FFD700';         ctx.fillText(teks, padding, y);
    } else {
      ctx.font = (i === 2 ? 'bold ' : '') + fontSize + 'px sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillText(teks, padding+1, y+1);
      ctx.fillStyle = 'white';            ctx.fillText(teks, padding, y);
    }
  });

  var finalCanvas = canvas;
  if (canvas.width > 800) {
    var r2 = document.createElement('canvas');
    var sc = 800 / canvas.width;
    r2.width = 800; r2.height = Math.round(canvas.height * sc);
    r2.getContext('2d').drawImage(canvas, 0, 0, r2.width, r2.height);
    finalCanvas = r2;
  }

  base64Foto               = finalCanvas.toDataURL('image/jpeg', 0.82);
  imgPreview.src           = base64Foto;
  imgPreview.style.display = 'block';
  previewText.style.display= 'none';
  btnUlang.style.display   = 'block';
}

/* ── GPS ────────────────────────────────────────────────────── */
function ambilGPSBackground() {
  if (!navigator.geolocation) { gpsStatus.textContent = 'GPS tidak didukung'; return; }
  gpsLoading = true;
  gpsStatus.textContent = '📡 Mengunci GPS...';
  navigator.geolocation.getCurrentPosition(
    function (pos) { simpanKoordinat(pos); setTimeout(ambilGPSBackground, 30000); },
    function () {
      navigator.geolocation.getCurrentPosition(
        function (pos) { simpanKoordinat(pos); setTimeout(ambilGPSBackground, 30000); },
        function () {
          gpsLoading = false; koordinatGPS = null;
          gpsStatus.innerHTML = '⚠️ GPS belum terkunci. <a href="#" onclick="ambilGPSBackground();return false;">Coba lagi</a>';
          setTimeout(ambilGPSBackground, 15000);
        },
        { enableHighAccuracy: false, timeout: 20000, maximumAge: 30000 }
      );
    },
    { enableHighAccuracy: true, timeout: 25000, maximumAge: 30000 }
  );
}
function simpanKoordinat(pos) {
  koordinatGPS = { lat: pos.coords.latitude, lon: pos.coords.longitude };
  gpsLoading   = false;
  gpsStatus.textContent = '✅ GPS terkunci (akurasi ±' + Math.round(pos.coords.accuracy) + 'm)';
}

/* ── Submit ─────────────────────────────────────────────────── */
function submitAbsensi() {
  var nama   = namaSelect.value;
  var outlet = outSelect.value;
  if (!outlet)     return Swal.fire("Perhatian", "Pilih lokasi outlet!", "warning");
  if (!nama)       return Swal.fire("Perhatian", "Pilih nama staff!", "warning");
  if (!base64Foto) return Swal.fire("Perhatian", "Ambil foto selfie terlebih dahulu!", "warning");
  if (gpsLoading)  return Swal.fire("Harap Tunggu", "GPS sedang mengunci lokasi.", "info");

  if (!koordinatGPS) {
    tampilkanLoading("Mencari GPS...");
    navigator.geolocation.getCurrentPosition(
      function (pos) { simpanKoordinat(pos); kirim(pos.coords.latitude, pos.coords.longitude); },
      function () {
        sembunyikanLoading();
        Swal.fire("GPS Error", "Gagal mendapatkan lokasi. Pastikan GPS aktif.", "error");
      },
      { enableHighAccuracy: false, timeout: 20000, maximumAge: 60000 }
    );
    return;
  }
  kirim(koordinatGPS.lat, koordinatGPS.lon);
}

function kirim(lat, lon) {
  tampilkanLoading("Mengirim data absensi...");
  apiPost({
    action     : "prosesAbsen",
    lat        : lat,
    lon        : lon,
    namaStaff  : namaSelect.value,
    imageBase64: base64Foto,
    status     : statusAbsen,
    namaOutlet : outSelect.value
  }, function (res) {
    sembunyikanLoading();
    if (typeof res === 'object' && res.status === "BERHASIL") {
      Swal.fire({
        icon: "success", title: "Berhasil!",
        html: "<b>" + res.nama + "</b><br>" + res.pesan +
              "<br><small>Jam: " + res.jam + " | Jarak: " + res.jarak + "</small>",
        confirmButtonColor: "#800000"
      }).then(function () { location.reload(); });
    } else {
      var pesanErr = typeof res === 'string' ? res : JSON.stringify(res);
      Swal.fire("Gagal", pesanErr, "error");
    }
  }, function (err) {
    sembunyikanLoading();
    Swal.fire("Error", "Gagal menghubungi server: " + err.message, "error");
  });
}

function tampilkanLoading(teks) {
  document.getElementById('loadingText').textContent = teks || "Memproses...";
  document.getElementById('loadingOverlay').classList.add('show');
  btnKirim.disabled = true;
}
function sembunyikanLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
  btnKirim.disabled = false;
}

/* ── Laporan ────────────────────────────────────────────────── */
function buatLaporan() {
  var t1 = document.getElementById('tglMulai').value;
  var t2 = document.getElementById('tglSelesai').value;
  var f  = document.getElementById('filterOutletLaporan').value;
  if (!t1 || !t2) return Swal.fire("Perhatian", "Isi tanggal mulai dan selesai!", "warning");
  if (t1 > t2)    return Swal.fire("Perhatian", "Tanggal mulai harus sebelum selesai!", "warning");

  document.getElementById('hasilLaporan').innerHTML = "<p style='text-align:center;color:#888;'>Memuat...</p>";
  apiFetch({ action: "getLaporanData", tglMulai: t1, tglSelesai: t2, filterOutlet: f }, function (res) {
    if (typeof res === 'string') {
      document.getElementById('hasilLaporan').innerHTML = "<p style='color:red;'>" + res + "</p>"; return;
    }
    var rekap = res.rekap, keys = Object.keys(rekap);
    if (keys.length === 0) {
      document.getElementById('hasilLaporan').innerHTML = "<p style='text-align:center;color:#888;'>Tidak ada data.</p>"; return;
    }
    var h = "<table class='table-res'><thead><tr><th>Nama</th><th>Hadir</th><th>NBM (Rp)</th></tr></thead><tbody>";
    keys.forEach(function (n) {
      h += "<tr><td style='text-align:left;'>" + n + "</td><td>" + rekap[n].masuk + "</td><td>" + rekap[n].nbm.toLocaleString('id-ID') + "</td></tr>";
    });
    h += "</tbody><tfoot><tr><td colspan='2' style='text-align:right;'>TOTAL</td><td>" + res.totalNBMAll.toLocaleString('id-ID') + "</td></tr></tfoot></table>";
    document.getElementById('hasilLaporan').innerHTML = h;
  });
}
</script>
</body>
</html>
