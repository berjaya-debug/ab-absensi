<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AB Absensi Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Nunito+Sans:wght@300;400;600;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --maroon:    #8B0000;
      --maroon-d:  #5c0000;
      --maroon-m:  #6d0000;
      --maroon-l:  #b00000;
      --gold:      #C9973A;
      --gold-soft: #e8bc6a;
      --cream:     #FDF6F0;
      --cream-d:   #F5EBE0;
      --bg:        #F8F2EC;
      --surface:   #ffffff;
      --text:      #2a1a1a;
      --muted:     #9a7a6a;
      --border:    #EDD8C8;
      --shadow:    0 4px 24px rgba(139,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(139,0,0,0.13);
      --radius:    20px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 56px;
      overflow-x: hidden;
    }

    /* ── Subtle background texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,0,0,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(201,151,58,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .site-header {
      width: 100%;
      background: linear-gradient(160deg, #ffffff 0%, #FDF2E8 60%, #FAE8D5 100%);
      padding: 22px 24px 20px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(201,151,58,0.2);
      box-shadow: 0 4px 28px rgba(139,0,0,0.08);
    }

    /* Decorative corner flourishes */
    .site-header::before,
    .site-header::after {
      content: '';
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      opacity: 0.07;
      background: var(--maroon);
    }
    .site-header::before { top: -60px; left: -40px; }
    .site-header::after  { bottom: -60px; right: -40px; }

    .header-logo-wrap {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      animation: logoFade 0.8s ease both;
    }
    @keyframes logoFade {
      from { opacity: 0; transform: scale(0.85) translateY(-8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .header-logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      filter: drop-shadow(0 2px 12px rgba(139,0,0,0.15));
    }

    .header-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
      z-index: 1;
      animation: textFade 0.9s ease 0.1s both;
    }
    @keyframes textFade {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 1.5px;
      line-height: 1.1;
      color: var(--maroon);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title .divider {
      width: 5px; height: 5px;
      background: var(--gold);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .header-byline {
      font-family: 'Dancing Script', cursive;
      font-size: 15px;
      color: var(--gold);
      font-weight: 600;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }



    /* ── Tab Bar ── */
    .tab-bar {
      width: 100%;
      background: var(--maroon-d);
      display: flex;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 20px rgba(0,0,0,0.2);
    }
    .tab-btn {
      flex: 1;
      padding: 14px 10px 12px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.45);
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-bottom: 3px solid transparent;
      transition: all .25s ease;
      text-transform: uppercase;
    }
    .tab-btn.active {
      color: var(--gold-soft);
      border-bottom-color: var(--gold-soft);
      background: rgba(201,151,58,0.08);
    }

    /* ── Tab Pages ── */
    .tab-page { display: none; width: 100%; flex-direction: column; align-items: center; }
    .tab-page.active { display: flex; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(237,216,200,0.6);
      width: calc(100% - 28px);
      max-width: 420px;
      padding: 22px 20px;
      margin-top: 16px;
      position: relative;
      animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.15) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0);    }
    }

    /* Thin top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-soft), transparent);
      border-radius: 0 0 4px 4px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--maroon);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::before {
      content: '';
      width: 3px; height: 14px;
      background: linear-gradient(to bottom, var(--gold), var(--maroon));
      border-radius: 2px;
      flex-shrink: 0;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── Inputs ── */
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    select, input[type="date"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: var(--cream);
      appearance: none;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    select:focus, input[type="date"]:focus {
      border-color: var(--maroon);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(139,0,0,0.07);
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Status Toggle ── */
    .status-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .status-opt {
      padding: 13px 8px 11px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      text-align: center;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.5px;
      color: var(--muted);
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
      user-select: none;
      background: var(--cream);
    }
    .status-opt .icon { display: block; font-size: 24px; margin-bottom: 4px; }
    .status-opt.active {
      background: var(--maroon);
      color: #fff;
      border-color: var(--maroon);
      box-shadow: 0 6px 20px rgba(139,0,0,0.25);
      transform: scale(1.03) translateY(-2px);
    }

    /* ── Camera Box ── */
    #previewBox {
      width: 100%;
      aspect-ratio: 4/3;
      border: 2px dashed #E0C5B5;
      border-radius: var(--radius-sm);
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color .2s, background .2s, box-shadow .2s;
      margin-bottom: 12px;
    }
    #previewBox:hover {
      border-color: var(--maroon);
      background: #FDF0E8;
      box-shadow: 0 0 0 4px rgba(139,0,0,0.05);
    }
    #imgPreview {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
      border-radius: calc(var(--radius-sm) - 2px);
    }
    .preview-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px;
    }
    .cam-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, rgba(139,0,0,0.1), rgba(201,151,58,0.1));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin-bottom: 6px;
      border: 1px solid rgba(139,0,0,0.1);
    }
    .preview-title {
      font-weight: 700;
      font-size: 13px;
      color: var(--maroon);
    }
    .preview-sub {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    /* ── GPS Status ── */
    #gpsStatus {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 14px;
      padding: 9px 14px;
      background: var(--cream);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      text-align: center;
    }
    #gpsStatus.ok { color: #2a7a3a; background: #f0faf3; border-color: #b5dfc0; }
    #gpsStatus.warn { color: #8B3A00; background: #fff5f0; border-color: #f5c5a0; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Nunito', sans-serif;
      font-size: 13.5px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-transform: uppercase;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-l) 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(139,0,0,0.28);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(139,0,0,0.35);
    }
    .btn-primary:disabled {
      background: linear-gradient(135deg, #c8a8a8, #b09090);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.7;
    }
    .btn-secondary { background: var(--cream-d); color: var(--muted); margin-bottom: 10px; }
    .btn-dark {
      background: linear-gradient(135deg, #3d2020 0%, #5c3030 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(60,20,20,0.2);
    }
    .btn-dark:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(60,20,20,0.3);
    }

    /* ── Loading Overlay ── */
    #loadingOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(50,5,5,0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #loadingOverlay.show { display: flex; }
    .loader-card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 44px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
      animation: popIn .3s cubic-bezier(.22,.68,0,1.3) both;
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .loader-ring {
      width: 48px; height: 48px;
      border: 3.5px solid #f0e0d8;
      border-top-color: var(--maroon);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--maroon);
      margin-bottom: 4px;
    }
    .loader-sub {
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Laporan Table ── */
    .table-wrap { overflow-x: auto; margin-top: 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .table-res { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .table-res th {
      background: linear-gradient(135deg, var(--maroon), var(--maroon-l));
      color: #fff;
      padding: 10px 12px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .table-res td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: center;
      font-weight: 500;
    }
    .table-res tr:last-child td { border-bottom: none; }
    .table-res tr:hover td { background: var(--cream); }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card {
      background: linear-gradient(135deg, var(--cream) 0%, #FDE8D8 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 12px;
      text-align: center;
    }
    .stat-label { font-size: 9.5px; font-weight: 800; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 800; color: var(--maroon); }

    /* ── Divider ── */
    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 16px 0;
    }
    
    /*pengajuan cuti*/
    .footer-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 11px;
      color: var(--muted); /* Menggunakan warna abu-abu yang sudah ada di variabel root Anda */
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      opacity: 0.7;
    }
    
    .footer-link:hover {
      text-decoration: underline;
      opacity: 1;
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loader-card">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loadingText">Sedang Memproses...</div>
    <div class="loader-sub">Mohon jangan tutup halaman ini</div>
  </div>
</div>

    </div>

    <div class="section-label">Foto Selfie</div>

    <input type="file" id="camInput" accept="image/*" capture="user" style="display:none" onchange="handlePhoto(this)">

    <div id="previewBox" onclick="document.getElementById('camInput').click()">
      <img id="imgPreview" alt="Preview">
      <div class="preview-inner" id="previewPlaceholder">
        <div class="cam-icon">📸</div>
        <div class="preview-title">Ambil Foto Selfie</div>
        <div class="preview-sub">Pastikan wajah terlihat jelas &amp; pencahayaan cukup</div>
      </div>
    </div>

    <div id="gpsStatus">📡 Mendeteksi lokasi GPS...</div>

    <button class="btn btn-primary" id="btnKirim" onclick="kirimAbsen()" disabled>
      🚀 Kirim Absensi Sekarang
    </button>
  </div>
</div>

<!-- TAB: LAPORAN -->
<div id="tab-laporan" class="tab-page">
  <div class="card">
    <div class="section-label">Filter Periode</div>
    <div class="date-row">
      <div class="field">
        <label>Tanggal Mulai</label>
        <input type="date" id="tglMulai">
      </div>
      <div class="field">
        <label>Tanggal Selesai</label>
        <input type="date" id="tglSelesai">
      </div>
    </div>

    <div class="field">
      <label>Outlet (Opsional)</label>
      <select id="filterOutlet">
        <option value="">Semua Outlet</option>
      </select>
    </div>

    <button class="btn btn-dark" onclick="tarikLaporan()">🔍 Tarik Data Laporan</button>
  </div>

  <div class="card" id="hasilCard" style="display:none; animation-delay:.1s">
    <div class="section-label">Ringkasan</div>
    <div class="stats-row" id="statsRow"></div>
    <div class="card-divider"></div>
    <div class="table-wrap" id="hasilLaporan"></div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz59EJ9Ls2KNBFtWHH6Oc-rDyl3H6u5DPSkqw3Hf1G5fcHkVJ5N-vgMgo0msdBMAleRvg/exec";

  let currentStatus = 'HADIR';
  let userLat = null, userLon = null;
  let photoBase64 = "";

  window.onload = function() {
    initGPS();
    loadOutlets();
    setDefaultDates();
  };

  function openTab(name, btn) {
    document.querySelectorAll('.tab-page').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function setStatus(s) {
    currentStatus = s;
    document.getElementById('optHadir').classList.toggle('active', s === 'HADIR');
    document.getElementById('optPulang').classList.toggle('active', s === 'PULANG');
  }

  function initGPS() {
    const st = document.getElementById('gpsStatus');
    if (!navigator.geolocation) {
      st.innerHTML = "❌ GPS tidak didukung browser ini";
      st.className = "warn";
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (p) => {
        userLat = p.coords.latitude;
        userLon = p.coords.longitude;
        st.innerHTML = "✅ Lokasi GPS berhasil terdeteksi";
        st.className = "ok";
        checkReady();
      },
      (err) => {
        st.innerHTML = "❌ GPS Error: " + err.message;
        st.className = "warn";
      },
      { enableHighAccuracy: true }
    );
  }

  function loadOutlets() {
    fetchJSONP(SCRIPT_URL + "?action=getListOutlet", (data) => {
      let h = '<option value="">— Pilih Outlet —</option>';
      let fh = '<option value="">Semua Outlet</option>';
      data.forEach(o => {
        h  += `<option value="${o}">${o}</option>`;
        fh += `<option value="${o}">${o}</option>`;
      });
      document.getElementById('selOutlet').innerHTML = h;
      document.getElementById('filterOutlet').innerHTML = fh;
    });
  }

  function loadStaffByOutlet() {
    const outlet = document.getElementById('selOutlet').value;
    if (!outlet) return;
    document.getElementById('selStaff').innerHTML = '<option>Memuat...</option>';
    fetchJSONP(SCRIPT_URL + "?action=getStaffByOutlet&outlet=" + encodeURIComponent(outlet), (data) => {
      let h = '<option value="">— Pilih Nama Staff —</option>';
      data.forEach(s => h += `<option value="${s}">${s}</option>`);
      document.getElementById('selStaff').innerHTML = h;
    });
    checkReady();
  }

  function handlePhoto(input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        // Draw image onto canvas then stamp watermark
        const canvas = document.createElement('canvas');
        canvas.width  = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        // --- Watermark data ---
        const outlet  = document.getElementById('selOutlet').value || '-';
        const staff   = document.getElementById('selStaff').value  || '-';
        const now     = new Date();
        const tgl     = now.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });
        const jam     = now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        const lines   = [
          '📍 ' + outlet,
          '👤 ' + staff,
          '📅 ' + tgl + '  🕐 ' + jam
        ];

        // Scale font to image size (so it looks good on both small/large photos)
        const fontSize   = Math.max(22, Math.round(canvas.width * 0.038));
        const lineHeight = fontSize * 1.55;
        const padX       = Math.round(canvas.width * 0.03);
        const padY       = Math.round(canvas.height * 0.022);
        const boxPad     = Math.round(fontSize * 0.55);

        ctx.font = `bold ${fontSize}px Arial, sans-serif`;

        // Measure widest line
        const maxW = lines.reduce((m, l) => Math.max(m, ctx.measureText(l).width), 0);
        const boxW = maxW + boxPad * 2;
        const boxH = lines.length * lineHeight + boxPad * 1.2;
        const boxX = padX;
        const boxY = canvas.height - padY - boxH;

        // Semi-transparent dark box
        ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
        roundRect(ctx, boxX, boxY, boxW, boxH, fontSize * 0.4);
        ctx.fill();

        // Maroon top border accent on box
        ctx.strokeStyle = '#CC0000';
        ctx.lineWidth   = Math.max(3, Math.round(canvas.width * 0.004));
        roundRect(ctx, boxX, boxY, boxW, boxH, fontSize * 0.4);
        ctx.stroke();

        // Text lines
        ctx.fillStyle    = '#FFFFFF';
        ctx.shadowColor  = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur   = 4;
        ctx.textBaseline = 'top';
        lines.forEach((line, i) => {
          ctx.fillText(line, boxX + boxPad, boxY + boxPad * 0.6 + i * lineHeight);
        });
        ctx.shadowBlur = 0;

        // Export with watermark
        photoBase64 = canvas.toDataURL('image/jpeg', 0.88);
        document.getElementById('imgPreview').src = photoBase64;
        document.getElementById('imgPreview').style.display = 'block';
        document.getElementById('previewPlaceholder').style.display = 'none';
        checkReady();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
  }

  // Helper: rounded rectangle path
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h,     x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y,         x + r, y);
    ctx.closePath();
  }

  function checkReady() {
    const outlet = document.getElementById('selOutlet').value;
    const staff  = document.getElementById('selStaff').value;
    document.getElementById('btnKirim').disabled = !(outlet && staff && userLat && photoBase64);
  }

  function kirimAbsen() {
    const payload = {
      action: "prosesAbsen",
      lat: userLat,
      lon: userLon,
      namaStaff:  document.getElementById('selStaff').value,
      namaOutlet: document.getElementById('selOutlet').value,
      status:     currentStatus,
      imageBase64: photoBase64
    };

    toggleLoading(true, "Memvalidasi Absensi...");

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(res => {
      toggleLoading(false);
      if (res.status === "BERHASIL") {
        Swal.fire({
          icon: 'success',
          title: 'Absen Berhasil! 🎉',
          html: `Halo <b>${res.nama}</b><br>Jam: ${res.jam}<br>${res.pesan}`,
          confirmButtonColor: '#8B0000',
          confirmButtonText: 'Tutup'
        }).then(() => location.reload());
      } else {
        Swal.fire({
          icon: 'warning',
          title: 'Gagal Absen',
          text: typeof res === 'string' ? res : res.error || "Terjadi kesalahan",
          confirmButtonColor: '#8B0000'
        });
      }
    })
    .catch(err => {
      toggleLoading(false);
      Swal.fire('Koneksi Error', 'Gagal terhubung: ' + err, 'error');
    });
  }

  function tarikLaporan() {
    const t1  = document.getElementById('tglMulai').value;
    const t2  = document.getElementById('tglSelesai').value;
    const out = document.getElementById('filterOutlet').value;

    toggleLoading(true, "Menarik Data Laporan...");
    fetchJSONP(`${SCRIPT_URL}?action=getLaporanData&tglMulai=${t1}&tglSelesai=${t2}&filterOutlet=${out}`, (res) => {
      toggleLoading(false);
      const rekap = res.rekap;
      const keys  = Object.keys(rekap);

      if (keys.length === 0) {
        Swal.fire('Info', 'Tidak ada data di periode tersebut', 'info');
        return;
      }

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Staff</div>
          <div class="stat-value">${keys.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total NBM</div>
          <div class="stat-value" style="font-size:15px">Rp ${res.totalNBMAll.toLocaleString('id-ID')}</div>
        </div>`;

      let h = "<table class='table-res'><thead><tr><th>Nama</th><th>Hadir</th><th>NBM</th></tr></thead><tbody>";
      keys.forEach(n => {
        h += `<tr><td>${n}</td><td>${rekap[n].masuk}</td><td>Rp ${rekap[n].nbm.toLocaleString('id-ID')}</td></tr>`;
      });
      h += "</tbody></table>";
      document.getElementById('hasilLaporan').innerHTML = h;
      document.getElementById('hasilCard').style.display = 'block';
    });
  }

  function toggleLoading(show, text = "") {
    document.getElementById('loadingOverlay').classList.toggle('show', show);
    if (text) document.getElementById('loadingText').innerText = text;
  }

  function fetchJSONP(url, callback) {
    const cbName = 'jsonp_' + Date.now();
    window[cbName] = function(data) {
      delete window[cbName];
      document.body.removeChild(script);
      callback(data);
    };
    const script = document.createElement('script');
    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
  }

  function setDefaultDates() {
    const now      = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    const today    = now.toISOString().split('T')[0];
    document.getElementById('tglMulai').value   = firstDay;
    document.getElementById('tglSelesai').value = today;
  }
</script>
