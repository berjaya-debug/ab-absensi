<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AB Absensi Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --maroon:    #800000;
      --maroon-d:  #5c0000;
      --maroon-l:  #a00000;
      --gold:      #FFD700;
      --gold-soft: #f5c842;
      --bg:        #f0eded;
      --surface:   #ffffff;
      --text:      #1a1a1a;
      --muted:     #888;
      --border:    #e8e0e0;
      --shadow:    0 8px 32px rgba(128,0,0,0.10);
      --radius:    18px;
      --radius-sm: 10px;
      --cream:     #F5E6D8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .site-header {
      width: 100%;
      background: #F5E6D8;
      padding: 16px 20px 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .header-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .header-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }
    .header-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .header-title .ab { color: var(--maroon); }
    .header-title .absensi { color: #6b3a2a; }
    .header-sub {
      font-size: 11px;
      color: #a06040;
      letter-spacing: 0.8px;
      margin-top: 2px;
      font-weight: 500;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      width: 100%;
      background: var(--maroon-d);
      display: flex;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 16px rgba(0,0,0,0.18);
    }
    .tab-btn {
      flex: 1;
      padding: 13px 10px 11px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-bottom: 3px solid transparent;
      transition: all .22s;
      text-transform: uppercase;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      background: rgba(255,215,0,0.06);
    }

    /* ── Tab Pages ── */
    .tab-page { display: none; width: 100%; flex-direction: column; align-items: center; }
    .tab-page.active { display: flex; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: calc(100% - 28px);
      max-width: 420px;
      padding: 22px 20px;
      margin-top: 18px;
      animation: slideUp 0.45s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(28px); }
      to   { opacity:1; transform: translateY(0);    }
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--maroon);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Inputs ── */
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    select, input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: #fafafa;
      appearance: none;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    /* ── Status Toggle ── */
    .status-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .status-opt {
      padding: 12px 8px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      color: var(--muted);
      transition: all .22s cubic-bezier(.34,1.56,.64,1);
      user-select: none;
      background: #fafafa;
    }
    .status-opt .icon { display: block; font-size: 22px; margin-bottom: 3px; }
    .status-opt.active {
      background: var(--maroon);
      color: #fff;
      border-color: var(--maroon);
      box-shadow: 0 4px 16px rgba(128,0,0,0.22);
      transform: scale(1.03);
    }

    /* ── Camera Box ── */
    #previewBox {
      width: 100%;
      aspect-ratio: 4/3;
      border: 2px dashed #d4b0b0;
      border-radius: var(--radius-sm);
      background: #fdf5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color .2s, background .2s;
      margin-bottom: 10px;
    }
    #imgPreview {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
      border-radius: calc(var(--radius-sm) - 2px);
    }
    .preview-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px;
    }
    .cam-icon {
      width: 64px; height: 64px;
      background: rgba(128,0,0,0.08);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin-bottom: 4px;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--maroon);
      color: #fff;
      box-shadow: 0 4px 18px rgba(128,0,0,0.25);
    }
    .btn-secondary { background: #f0eded; color: #555; margin-bottom: 10px; }
    .btn-dark { background: #3a3a3a; color: #fff; }

    /* ── Loading Overlay ── */
    #loadingOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(80,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #loadingOverlay.show { display: flex; }
    .loader-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 40px;
      text-align: center;
    }
    .loader-ring {
      width: 52px; height: 52px;
      border: 4px solid #f0e0e0;
      border-top-color: var(--maroon);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Laporan Table ── */
    .table-wrap { overflow-x: auto; margin-top: 14px; border-radius: var(--radius-sm); }
    .table-res { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .table-res th { background: var(--maroon); color: #fff; padding: 9px 10px; }
    .table-res td { padding: 9px 10px; border-bottom: 1px solid var(--border); text-align: center; }
    
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: #fdf5f5; border: 1px solid #f0dada; border-radius: var(--radius-sm); padding: 14px 12px; text-align: center; }
    .stat-label { font-size: 10px; font-weight: 700; color: #b07070; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 800; color: var(--maroon); }

  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loader-card">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loadingText">Sedang Memproses...</div>
    <div class="loader-sub">Mohon jangan tutup halaman ini</div>
  </div>
</div>

<div class="site-header">
  <div class="header-text">
    <div class="header-title"><span class="ab">AB</span> <span class="absensi">ABSENSI</span></div>
    <div class="header-sub">SISTEM PRESENSI ONLINE</div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="openTab('absen')">
    <span class="tab-icon">📋</span> Absensi
  </button>
  <button class="tab-btn" onclick="openTab('laporan')">
    <span class="tab-icon">📊</span> Laporan
  </button>
</div>

<div id="tab-absen" class="tab-page active">
  <div class="card">
    <div class="section-label">Informasi Lokasi</div>
    
    <div class="field">
      <label>Pilih Outlet</label>
      <select id="selOutlet" onchange="loadStaffByOutlet()">
        <option value="">-- Loading Outlet... --</option>
      </select>
    </div>

    <div class="field">
      <label>Nama Staff</label>
      <select id="selStaff">
        <option value="">-- Pilih Outlet Dulu --</option>
      </select>
    </div>

    <div class="section-label">Status & Foto</div>
    
    <div class="status-container">
      <div id="optHadir" class="status-opt active" onclick="setStatus('HADIR')">
        <span class="icon">☀️</span> HADIR
      </div>
      <div id="optPulang" class="status-opt" onclick="setStatus('PULANG')">
        <span class="icon">🏠</span> PULANG
      </div>
    </div>

    <input type="file" id="camInput" accept="image/*" capture="user" style="display:none" onchange="handlePhoto(this)">
    
    <div id="previewBox" onclick="document.getElementById('camInput').click()">
      <img id="imgPreview">
      <div class="preview-inner" id="previewPlaceholder">
        <div class="cam-icon">📸</div>
        <div class="preview-title">Ambil Foto Selfie</div>
        <div class="preview-sub">Pastikan wajah terlihat jelas</div>
      </div>
    </div>

    <div id="gpsStatus">Menunggu lokasi GPS...</div>
    
    <button class="btn btn-primary" id="btnKirim" onclick="kirimAbsen()" disabled>
      🚀 KIRIM ABSENSI SEKARANG
    </button>
  </div>
</div>

<div id="tab-laporan" class="tab-page">
  <div class="card">
    <div class="section-label">Filter Periode</div>
    <div class="date-row">
      <div class="field">
        <label>Mulai</label>
        <input type="date" id="tglMulai">
      </div>
      <div class="field">
        <label>Selesai</label>
        <input type="date" id="tglSelesai">
      </div>
    </div>
    
    <div class="field">
      <label>Outlet (Opsional)</label>
      <select id="filterOutlet">
        <option value="">Semua Outlet</option>
      </select>
    </div>

    <button class="btn btn-dark" onclick="tarikLaporan()">🔍 TARIK DATA LAPORAN</button>
  </div>

  <div class="card" id="hasilCard" style="display:none;">
    <div class="section-label">Ringkasan NBM</div>
    <div class="stats-row" id="statsRow"></div>
    <div class="table-wrap" id="hasilLaporan"></div>
  </div>
</div>

<script>
  // GANTI INI DENGAN URL WEB APP ANDA
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz59EJ9Ls2KNBFtWHH6Oc-rDyl3H6u5DPSkqw3Hf1G5fcHkVJ5N-vgMgo0msdBMAleRvg/exec"; 

  let currentStatus = 'HADIR';
  let userLat = null, userLon = null;
  let photoBase64 = "";

  window.onload = function() {
    initGPS();
    loadOutlets();
    setDefaultDates();
  };

  function openTab(name) {
    document.querySelectorAll('.tab-page, .tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  function setStatus(s) {
    currentStatus = s;
    document.getElementById('optHadir').classList.toggle('active', s === 'HADIR');
    document.getElementById('optPulang').classList.toggle('active', s === 'PULANG');
  }

  function initGPS() {
    const st = document.getElementById('gpsStatus');
    if (!navigator.geolocation) {
      st.innerHTML = "❌ GPS tidak didukung browser";
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (p) => {
        userLat = p.coords.latitude;
        userLon = p.coords.longitude;
        st.innerHTML = "✅ Lokasi GPS Terkunci";
        st.className = "ok";
        checkReady();
      },
      (err) => {
        st.innerHTML = "❌ GPS Error: " + err.message;
        st.className = "warn";
      },
      { enableHighAccuracy: true }
    );
  }

  function loadOutlets() {
    fetchJSONP(SCRIPT_URL + "?action=getListOutlet", (data) => {
      let h = '<option value="">-- Pilih Outlet --</option>';
      let fh = '<option value="">Semua Outlet</option>';
      data.forEach(o => {
        h += `<option value="${o}">${o}</option>`;
        fh += `<option value="${o}">${o}</option>`;
      });
      document.getElementById('selOutlet').innerHTML = h;
      document.getElementById('filterOutlet').innerHTML = fh;
    });
  }

  function loadStaffByOutlet() {
    const outlet = document.getElementById('selOutlet').value;
    if (!outlet) return;
    document.getElementById('selStaff').innerHTML = '<option>Loading...</option>';
    fetchJSONP(SCRIPT_URL + "?action=getStaffByOutlet&outlet=" + encodeURIComponent(outlet), (data) => {
      let h = '<option value="">-- Pilih Nama --</option>';
      data.forEach(s => h += `<option value="${s}">${s}</option>`);
      document.getElementById('selStaff').innerHTML = h;
    });
  }

  function handlePhoto(input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      photoBase64 = e.target.result;
      document.getElementById('imgPreview').src = photoBase64;
      document.getElementById('imgPreview').style.display = 'block';
      document.getElementById('previewPlaceholder').style.display = 'none';
      checkReady();
    };
    reader.readAsDataURL(input.files[0]);
  }

  function checkReady() {
    const outlet = document.getElementById('selOutlet').value;
    const staff = document.getElementById('selStaff').value;
    document.getElementById('btnKirim').disabled = !(outlet && staff && userLat && photoBase64);
  }

  function kirimAbsen() {
    const payload = {
      action: "prosesAbsen",
      lat: userLat,
      lon: userLon,
      namaStaff: document.getElementById('selStaff').value,
      namaOutlet: document.getElementById('selOutlet').value,
      status: currentStatus,
      imageBase64: photoBase64
    };

    toggleLoading(true, "Memvalidasi Absensi...");

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(res => {
      toggleLoading(false);
      if (res.status === "BERHASIL") {
        Swal.fire({
          icon: 'success',
          title: 'Absen Berhasil!',
          html: `Halo <b>${res.nama}</b><br>Jam: ${res.jam}<br>${res.pesan}`,
          confirmButtonColor: '#800000'
        }).then(() => location.reload());
      } else {
        // Ini menangkap pesan "GAGAL: ..." dari Apps Script
        Swal.fire({
          icon: 'warning',
          title: 'Gagal Absen',
          text: typeof res === 'string' ? res : res.error || "Terjadi kesalahan",
          confirmButtonColor: '#800000'
        });
      }
    })
    .catch(err => {
      toggleLoading(false);
      Swal.fire('Error', 'Koneksi bermasalah: ' + err, 'error');
    });
  }

  function tarikLaporan() {
    const t1 = document.getElementById('tglMulai').value;
    const t2 = document.getElementById('tglSelesai').value;
    const out = document.getElementById('filterOutlet').value;
    
    toggleLoading(true, "Menarik Data...");
    fetchJSONP(`${SCRIPT_URL}?action=getLaporanData&tglMulai=${t1}&tglSelesai=${t2}&filterOutlet=${out}`, (res) => {
      toggleLoading(false);
      const rekap = res.rekap;
      const keys = Object.keys(rekap);
      
      if (keys.length === 0) {
        Swal.fire('Info', 'Tidak ada data di periode tersebut', 'info');
        return;
      }

      let statsHTML = `
        <div class="stat-card"><div class="stat-label">Total Staff</div><div class="stat-value">${keys.length}</div></div>
        <div class="stat-card"><div class="stat-label">Total NBM</div><div class="stat-value" style="font-size:14px">Rp ${res.totalNBMAll.toLocaleString('id-ID')}</div></div>
      `;
      document.getElementById('statsRow').innerHTML = statsHTML;

      let h = "<table class='table-res'><thead><tr><th>Nama</th><th>Hadir</th><th>NBM</th></tr></thead><tbody>";
      keys.forEach(n => {
        h += `<tr><td>${n}</td><td>${rekap[n].masuk}</td><td>${rekap[n].nbm.toLocaleString('id-ID')}</td></tr>`;
      });
      h += "</tbody></table>";
      document.getElementById('hasilLaporan').innerHTML = h;
      document.getElementById('hasilCard').style.display = 'block';
    });
  }

  function toggleLoading(show, text = "") {
    document.getElementById('loadingOverlay').classList.toggle('show', show);
    if (text) document.getElementById('loadingText').innerText = text;
  }

  function fetchJSONP(url, callback) {
    const callbackName = 'jsonp_' + Date.now();
    window[callbackName] = function(data) {
      delete window[callbackName];
      document.body.removeChild(script);
      callback(data);
    };
    const script = document.createElement('script');
    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
    document.body.appendChild(script);
  }

  function setDefaultDates() {
    const now = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    const today = now.toISOString().split('T')[0];
    document.getElementById('tglMulai').value = firstDay;
    document.getElementById('tglSelesai').value = today;
  }
</script>

</body>
</html>
