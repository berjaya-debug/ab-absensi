<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AB Absensi Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --maroon:    #800000;
      --maroon-d:  #5c0000;
      --maroon-l:  #a00000;
      --gold:      #FFD700;
      --gold-soft: #f5c842;
      --bg:        #f0eded;
      --surface:   #ffffff;
      --text:      #1a1a1a;
      --muted:     #888;
      --border:    #e8e0e0;
      --shadow:    0 8px 32px rgba(128,0,0,0.10);
      --radius:    18px;
      --radius-sm: 10px;
      --cream:     #F5E6D8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .site-header {
      width: 100%;
      background: #F5E6D8;
      padding: 16px 20px 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .site-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(128,0,0,0.05);
    }
    .site-header::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -20px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(128,0,0,0.03);
    }
    .header-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .header-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }
    .header-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .header-title .ab { color: var(--maroon); }
    .header-title .absensi { color: #6b3a2a; }
    .header-sub {
      font-size: 11px;
      color: #a06040;
      letter-spacing: 0.8px;
      margin-top: 2px;
      font-weight: 500;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      width: 100%;
      background: var(--maroon-d);
      display: flex;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 16px rgba(0,0,0,0.18);
    }
    .tab-btn {
      flex: 1;
      padding: 13px 10px 11px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-bottom: 3px solid transparent;
      transition: all .22s;
      text-transform: uppercase;
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      background: rgba(255,215,0,0.06);
    }
    .tab-btn:hover:not(.active) {
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.05);
    }
    .tab-icon { font-size: 16px; }

    /* ── Tab Pages ── */
    .tab-page { display: none; width: 100%; flex-direction: column; align-items: center; }
    .tab-page.active { display: flex; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: calc(100% - 28px);
      max-width: 420px;
      padding: 22px 20px;
      margin-top: 18px;
      animation: slideUp 0.45s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(28px); }
      to   { opacity:1; transform: translateY(0);    }
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--maroon);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Inputs ── */
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    select, input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: #fafafa;
      appearance: none;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    select:focus, input[type="date"]:focus {
      border-color: var(--maroon);
      box-shadow: 0 0 0 3px rgba(128,0,0,0.08);
      background: #fff;
    }

    /* ── Status Toggle ── */
    .status-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .status-opt {
      padding: 12px 8px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      color: var(--muted);
      transition: all .22s cubic-bezier(.34,1.56,.64,1);
      user-select: none;
      background: #fafafa;
    }
    .status-opt .icon { display: block; font-size: 22px; margin-bottom: 3px; }
    .status-opt.active {
      background: var(--maroon);
      color: #fff;
      border-color: var(--maroon);
      box-shadow: 0 4px 16px rgba(128,0,0,0.22);
      transform: scale(1.03);
    }

    /* ── Camera Box ── */
    #previewBox {
      width: 100%;
      aspect-ratio: 4/3;
      border: 2px dashed #d4b0b0;
      border-radius: var(--radius-sm);
      background: #fdf5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color .2s, background .2s;
      margin-bottom: 10px;
    }
    #previewBox:hover { border-color: var(--maroon); background: #fff8f8; }
    #previewBox:active { transform: scale(0.985); }
    #imgPreview {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
      border-radius: calc(var(--radius-sm) - 2px);
    }
    .preview-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px;
    }
    .cam-icon {
      width: 64px; height: 64px;
      background: rgba(128,0,0,0.08);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin-bottom: 4px;
      transition: transform .2s;
    }
    #previewBox:hover .cam-icon { transform: scale(1.1); }
    .preview-title { font-weight: 700; color: var(--maroon); font-size: 14px; }
    .preview-sub   { font-size: 11px; color: #b07070; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--maroon);
      color: #fff;
      box-shadow: 0 4px 18px rgba(128,0,0,0.25);
    }
    .btn-primary:hover  { background: var(--maroon-l); box-shadow: 0 6px 24px rgba(128,0,0,0.32); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(128,0,0,0.18); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: #f0eded;
      color: #555;
      margin-bottom: 10px;
    }
    .btn-secondary:hover { background: #e6e0e0; }
    .btn-dark {
      background: #3a3a3a;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }
    .btn-dark:hover { background: #2a2a2a; transform: translateY(-1px); }
    .btn-dark:active { transform: translateY(0); }

    /* ── GPS Status ── */
    #gpsStatus {
      font-size: 12px;
      text-align: center;
      color: var(--muted);
      margin: 8px 0;
      font-family: 'DM Mono', monospace;
      min-height: 18px;
      transition: color .3s;
    }
    #gpsStatus.ok   { color: #2a8a2a; }
    #gpsStatus.warn { color: #c85000; }

    /* ── Date Row ── */
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── Loading Overlay ── */
    #loadingOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(80,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #loadingOverlay.show { display: flex; }
    .loader-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { opacity:0; transform: scale(0.85); }
      to   { opacity:1; transform: scale(1);    }
    }
    .loader-ring {
      width: 52px; height: 52px;
      border: 4px solid #f0e0e0;
      border-top-color: var(--maroon);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--maroon);
    }
    .loader-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Laporan Table ── */
    .table-wrap { overflow-x: auto; margin-top: 14px; border-radius: var(--radius-sm); }
    .table-res {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }
    .table-res th {
      background: var(--maroon);
      color: #fff;
      padding: 9px 10px;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .table-res th:first-child { border-radius: var(--radius-sm) 0 0 0; }
    .table-res th:last-child  { border-radius: 0 var(--radius-sm) 0 0; }
    .table-res td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      text-align: center;
      color: var(--text);
    }
    .table-res tbody tr:hover { background: #fff5f5; }
    .table-res tfoot td {
      font-weight: 700;
      color: var(--maroon);
      background: #fff0f0;
      border-top: 2px solid #e8c0c0;
    }

    /* ── Laporan Info Banner ── */
    .laporan-empty {
      text-align: center;
      padding: 28px 20px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .laporan-empty-icon {
      font-size: 36px;
      margin-bottom: 4px;
    }

    /* ── Summary Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: #fdf5f5;
      border: 1px solid #f0dada;
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #b07070;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--maroon);
      line-height: 1;
    }
    .stat-value.small { font-size: 14px; margin-top: 2px; }

    /* ── SweetAlert custom ── */
    .swal2-popup { border-radius: 20px !important; font-family: 'Outfit', sans-serif !important; }
    .swal2-title { font-family: 'Outfit', sans-serif !important; font-weight: 700 !important; }
    .swal2-confirm { border-radius: 10px !important; font-family: 'Outfit', sans-serif !important; font-weight: 700 !important; }
  </style>
</head>

</div>

    <span class="tab-icon">📊</span> Rekap NBM
  </button>
</div>

<!-- ══════════════════════════════════
     TAB 1 — FORM ABSENSI
══════════════════════════════════ -->
<div class="tab-page active" id="tabAbsensi">
  <div class="card">
    <div class="section-label">Form Kehadiran</div>

    <div class="field">
      <label>Lokasi Outlet</label>
      <select id="pilihOutlet" onchange="updateStaff()">
        <option value="">📍 Pilih Lokasi Outlet</option>
      </select>
    </div>

    <div class="field">
      <label>Nama Staff</label>
      <select id="namaStaff">
        <option value="">👤 Pilih Nama</option>
      </select>
    </div>

    <div class="field">
      <label>Status Kehadiran</label>
      <div class="status-container">
        <label class="status-opt active" id="optHadir" onclick="pilihStatus('HADIR')">
          <span class="icon">✅</span>HADIR
        </label>
        <label class="status-opt" id="optPulang" onclick="pilihStatus('PULANG')">
          <span class="icon">🏠</span>PULANG
        </label>
      </div>
    </div>

    <div class="field">
      <label>Foto Selfie</label>
      <input type="file" id="inputKamera" accept="image/*" capture="user" style="display:none">
      <div id="previewBox" onclick="bukaKamera()">
        <img id="imgPreview" alt="preview">
        <div class="preview-inner" id="previewText">
          <div class="cam-icon">📷</div>
          <div class="preview-title">KETUK UNTUK FOTO</div>
          <div class="preview-sub">Tampilkan Wajah &amp; Background</div>
        </div>
      </div>
      <button class="btn btn-secondary" id="btnUlang" onclick="resetFoto()" style="display:none;">
        🔄 Ulangi Foto
      </button>
    </div>

    <div id="gpsStatus">📡 Menunggu GPS...</div>

    <button class="btn btn-primary" id="btnKirim" onclick="submitAbsensi()">
      <span>Kirim Absensi</span> <span>→</span>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════
     TAB 2 — REKAP LAPORAN NBM
══════════════════════════════════ -->
<div class="tab-page" id="tabLaporan">
  <div class="card">
    <div class="section-label">Filter Laporan</div>

    <div class="date-row" style="margin-bottom:12px;">
      <div class="field" style="margin:0;">
        <label>Mulai</label>
        <input type="date" id="tglMulai">
      </div>
      <div class="field" style="margin:0;">
        <label>Sampai</label>
        <input type="date" id="tglSelesai">
      </div>
    </div>

    <div class="field">
      <label>Filter Outlet</label>
      <select id="filterOutletLaporan">
        <option value="">🏪 Semua Outlet</option>
        <option value="Central Kitchen">Central Kitchen</option>
        <option value="Serpong">Serpong</option>
        <option value="Sentul">Sentul</option>
      </select>
    </div>

    <button class="btn btn-dark" onclick="buatLaporan()">
      📊 Tampilkan Rekap
    </button>
  </div>

  <!-- Result Card -->
  <div class="card" id="hasilCard" style="display:none;">
    <div class="section-label">Rekap NBM</div>

    <!-- Summary Stats -->
    <div class="stats-row" id="statsRow"></div>

    <!-- Table -->
    <div id="hasilLaporan" class="table-wrap"></div>
  </div>

  <!-- Empty State -->
  <div class="card" id="emptyCard">
    <div class="laporan-empty">
      <div class="laporan-empty-icon">📂</div>
      <strong style="color:#555;">Belum ada data ditampilkan</strong>
      <span>Pilih rentang tanggal &amp; outlet, lalu klik <b>Tampilkan Rekap</b></span>
    </div>
  </div>
</div>

<script>
// ================================================================
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz59EJ9Ls2KNBFtWHH6Oc-rDyl3H6u5DPSkqw3Hf1G5fcHkVJ5N-vgMgo0msdBMAleRvg/exec";
// ================================================================

var base64Foto   = null;
var statusAbsen  = "HADIR";
var koordinatGPS = null;
var gpsLoading   = false;

var outSelect   = document.getElementById('pilihOutlet');
var namaSelect  = document.getElementById('namaStaff');
var gpsStatus   = document.getElementById('gpsStatus');
var btnKirim    = document.getElementById('btnKirim');
var imgPreview  = document.getElementById('imgPreview');
var previewText = document.getElementById('previewText');
var btnUlang    = document.getElementById('btnUlang');

/* ── Tab Switch ── */
function switchTab(tab) {
  document.getElementById('tabAbsensi').classList.toggle('active', tab === 'absensi');
  document.getElementById('tabLaporan').classList.toggle('active', tab === 'laporan');
  document.getElementById('tabAbsensiBtn').classList.toggle('active', tab === 'absensi');
  document.getElementById('tabLaporanBtn').classList.toggle('active', tab === 'laporan');
}

/* ── Init ── */
window.onload = function () {
  jsonpFetch({ action: "getListOutlet" }, function (outlets) {
    outSelect.innerHTML = '<option value="">📍 Pilih Lokasi Outlet</option>';
    outlets.forEach(function (o) {
      var opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      outSelect.appendChild(opt);
    });
  });
  document.getElementById('inputKamera').addEventListener('change', function () { handleFile(this); });
  ambilGPSBackground();

  // Set default date range = current month
  var now = new Date();
  var y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
  var lastDay = new Date(y, now.getMonth()+1, 0).getDate();
  document.getElementById('tglMulai').value  = y + '-' + m + '-01';
  document.getElementById('tglSelesai').value = y + '-' + m + '-' + lastDay;
};

/* ── JSONP ── */
var jsonpCallbackCounter = 0;
function jsonpFetch(params, onSuccess, onError) {
  var cbName = '__jsonpCb' + (++jsonpCallbackCounter);
  params.callback = cbName;
  var url = APPS_SCRIPT_URL + '?' + Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  window[cbName] = function(data) {
    delete window[cbName];
    document.head.removeChild(script);
    if (onSuccess) onSuccess(data);
  };
  var script = document.createElement('script');
  script.src = url;
  script.onerror = function() {
    delete window[cbName];
    document.head.removeChild(script);
    if (onError) onError(new Error('JSONP gagal'));
  };
  document.head.appendChild(script);
}

/* ── POST ── */
function apiPost(payload, onSuccess, onError) {
  fetch(APPS_SCRIPT_URL, {
    method: "POST", redirect: "follow",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  })
    .then(function (r) { return r.json(); })
    .then(function (data) { if (onSuccess) onSuccess(data); })
    .catch(function (e) { if (onError) onError(e); });
}

/* ── Status ── */
function pilihStatus(s) {
  statusAbsen = s;
  document.getElementById('optHadir').classList.toggle('active',  s === 'HADIR');
  document.getElementById('optPulang').classList.toggle('active', s === 'PULANG');
}

function updateStaff() {
  var outlet = outSelect.value;
  if (!outlet) return;
  namaSelect.innerHTML = '<option>Memuat...</option>';
  jsonpFetch({ action: "getStaffByOutlet", outlet: outlet }, function (names) {
    namaSelect.innerHTML = '<option value="">👤 Pilih Nama</option>';
    names.forEach(function (n) {
      var opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      namaSelect.appendChild(opt);
    });
  }, function () {
    namaSelect.innerHTML = '<option value="">⚠️ Gagal memuat</option>';
  });
}

/* ── Kamera ── */
function bukaKamera() {
  if (base64Foto) return;
  document.getElementById('inputKamera').click();
}
function resetFoto() {
  base64Foto               = null;
  imgPreview.style.display = 'none';
  imgPreview.src           = '';
  previewText.style.display= 'flex';
  btnUlang.style.display   = 'none';
}
function handleFile(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function (e) {
    var img = new Image();
    img.onload = function () {
      var maxW  = 1280, ratio = Math.min(1, maxW / img.width);
      var canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      prosesWatermark(canvas);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
  input.value = '';
}
function prosesWatermark(canvas) {
  var ctx    = canvas.getContext('2d');
  var nama   = namaSelect.value || "-";
  var outlet = outSelect.value  || "-";
  var now    = new Date();
  var jam    = now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  var tgl    = now.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });
  var baris  = ["AB ABSENSI ONLINE", statusAbsen + "  —  " + outlet, nama, tgl + "   " + jam];
  var fontSize   = Math.max(14, Math.round(canvas.width / 26));
  var padding    = Math.round(fontSize * 0.65);
  var lineHeight = fontSize + padding;
  var boxH       = lineHeight * baris.length + padding * 2;
  var boxY       = canvas.height - boxH;
  ctx.fillStyle = 'rgba(0,0,0,0.60)'; ctx.fillRect(0, boxY, canvas.width, boxH);
  ctx.fillStyle = '#800000'; ctx.fillRect(0, boxY, canvas.width, Math.max(3, Math.round(fontSize * 0.2)));
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  baris.forEach(function (teks, i) {
    var y = boxY + padding + lineHeight * i;
    if (i === 0) {
      ctx.font = 'bold ' + Math.round(fontSize * 1.05) + 'px sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillText(teks, padding+1, y+1);
      ctx.fillStyle = '#FFD700'; ctx.fillText(teks, padding, y);
    } else {
      ctx.font = (i === 2 ? 'bold ' : '') + fontSize + 'px sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillText(teks, padding+1, y+1);
      ctx.fillStyle = 'white'; ctx.fillText(teks, padding, y);
    }
  });
  var finalCanvas = canvas;
  if (canvas.width > 800) {
    var r2 = document.createElement('canvas'), sc = 800 / canvas.width;
    r2.width = 800; r2.height = Math.round(canvas.height * sc);
    r2.getContext('2d').drawImage(canvas, 0, 0, r2.width, r2.height);
    finalCanvas = r2;
  }
  base64Foto               = finalCanvas.toDataURL('image/jpeg', 0.82);
  imgPreview.src           = base64Foto;
  imgPreview.style.display = 'block';
  previewText.style.display= 'none';
  btnUlang.style.display   = 'block';
}

/* ── GPS ── */
function ambilGPSBackground() {
  if (!navigator.geolocation) { gpsStatus.textContent = 'GPS tidak didukung'; return; }
  gpsLoading = true;
  gpsStatus.className = '';
  gpsStatus.textContent = '📡 Mengunci GPS...';
  navigator.geolocation.getCurrentPosition(
    function (pos) { simpanKoordinat(pos); setTimeout(ambilGPSBackground, 30000); },
    function () {
      navigator.geolocation.getCurrentPosition(
        function (pos) { simpanKoordinat(pos); setTimeout(ambilGPSBackground, 30000); },
        function () {
          gpsLoading = false; koordinatGPS = null;
          gpsStatus.className = 'warn';
          gpsStatus.innerHTML = '⚠️ GPS belum terkunci. <a href="#" onclick="ambilGPSBackground();return false;" style="color:inherit;">Coba lagi</a>';
          setTimeout(ambilGPSBackground, 15000);
        },
        { enableHighAccuracy: false, timeout: 20000, maximumAge: 30000 }
      );
    },
    { enableHighAccuracy: true, timeout: 25000, maximumAge: 30000 }
  );
}
function simpanKoordinat(pos) {
  koordinatGPS = { lat: pos.coords.latitude, lon: pos.coords.longitude };
  gpsLoading   = false;
  gpsStatus.className = 'ok';
  gpsStatus.textContent = '✅ GPS terkunci (±' + Math.round(pos.coords.accuracy) + 'm)';
}

/* ── Submit Absensi ── */
function submitAbsensi() {
  var nama   = namaSelect.value;
  var outlet = outSelect.value;
  if (!outlet)     return Swal.fire({ title:"Perhatian", text:"Pilih lokasi outlet!", icon:"warning", confirmButtonColor:"#800000" });
  if (!nama)       return Swal.fire({ title:"Perhatian", text:"Pilih nama staff!", icon:"warning", confirmButtonColor:"#800000" });
  if (!base64Foto) return Swal.fire({ title:"Perhatian", text:"Ambil foto selfie terlebih dahulu!", icon:"warning", confirmButtonColor:"#800000" });
  if (gpsLoading)  return Swal.fire({ title:"Harap Tunggu", text:"GPS sedang mengunci lokasi.", icon:"info", confirmButtonColor:"#800000" });

  if (!koordinatGPS) {
    tampilkanLoading("Mencari GPS...");
    navigator.geolocation.getCurrentPosition(
      function (pos) { simpanKoordinat(pos); kirim(pos.coords.latitude, pos.coords.longitude); },
      function () {
        sembunyikanLoading();
        Swal.fire({ title:"GPS Error", text:"Gagal mendapatkan lokasi. Pastikan GPS aktif.", icon:"error", confirmButtonColor:"#800000" });
      },
      { enableHighAccuracy: false, timeout: 20000, maximumAge: 60000 }
    );
    return;
  }
  kirim(koordinatGPS.lat, koordinatGPS.lon);
}

function kirim(lat, lon) {
  tampilkanLoading("Mengirim data absensi...");
  apiPost({
    action: "prosesAbsen", lat: lat, lon: lon,
    namaStaff: namaSelect.value, imageBase64: base64Foto,
    status: statusAbsen, namaOutlet: outSelect.value
  }, function (res) {
    sembunyikanLoading();
    if (typeof res === 'object' && res.status === "BERHASIL") {
      Swal.fire({
        icon: "success", title: "Berhasil!",
        html: "<b>" + res.nama + "</b><br>" + res.pesan +
              "<br><small style='color:#888;'>Jam: " + res.jam + " | Jarak: " + res.jarak + "</small>",
        confirmButtonColor: "#800000",
        confirmButtonText: "Selesai"
      }).then(function () { location.reload(); });
    } else {
      var pesanErr = typeof res === 'string' ? res : JSON.stringify(res);
      Swal.fire({ title:"Gagal", text: pesanErr, icon:"error", confirmButtonColor:"#800000" });
    }
  }, function (err) {
    sembunyikanLoading();
    Swal.fire({ title:"Error", text:"Gagal menghubungi server: " + err.message, icon:"error", confirmButtonColor:"#800000" });
  });
}

function tampilkanLoading(teks) {
  document.getElementById('loadingText').textContent = teks || "Memproses...";
  document.getElementById('loadingOverlay').classList.add('show');
  btnKirim.disabled = true;
}
function sembunyikanLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
  btnKirim.disabled = false;
}

/* ── Laporan ── */
function buatLaporan() {
  var t1 = document.getElementById('tglMulai').value;
  var t2 = document.getElementById('tglSelesai').value;
  var f  = document.getElementById('filterOutletLaporan').value;
  if (!t1 || !t2) return Swal.fire({ title:"Perhatian", text:"Isi tanggal mulai dan selesai!", icon:"warning", confirmButtonColor:"#800000" });
  if (t1 > t2)    return Swal.fire({ title:"Perhatian", text:"Tanggal mulai harus sebelum selesai!", icon:"warning", confirmButtonColor:"#800000" });

  document.getElementById('hasilCard').style.display = 'none';
  document.getElementById('emptyCard').style.display = 'block';
  document.getElementById('emptyCard').querySelector('.laporan-empty').innerHTML =
    '<div class="laporan-empty-icon">⏳</div><span style="color:#aaa;font-size:13px;">Memuat data rekap...</span>';

  jsonpFetch({ action:"getLaporanData", tglMulai:t1, tglSelesai:t2, filterOutlet:f }, function (res) {
    if (typeof res === 'string') {
      document.getElementById('emptyCard').querySelector('.laporan-empty').innerHTML =
        '<div class="laporan-empty-icon">⚠️</div><span style="color:red;font-size:13px;">' + res + '</span>';
      return;
    }

    var rekap = res.rekap, keys = Object.keys(rekap);

    if (keys.length === 0) {
      document.getElementById('emptyCard').style.display = 'block';
      document.getElementById('emptyCard').querySelector('.laporan-empty').innerHTML =
        '<div class="laporan-empty-icon">📂</div><strong style="color:#555;">Tidak ada data</strong><span>Periode ini tidak memiliki catatan absensi.</span>';
      return;
    }

    // Build stats
    var totalHadir = 0;
    keys.forEach(function(n){ totalHadir += rekap[n].masuk; });
    var statsHTML =
      '<div class="stat-card"><div class="stat-label">Total Staff</div><div class="stat-value">' + keys.length + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">Total Hadir</div><div class="stat-value">' + totalHadir + '</div></div>' +
      '<div class="stat-card" style="grid-column:1/-1;"><div class="stat-label">Total NBM</div><div class="stat-value small">Rp ' + res.totalNBMAll.toLocaleString('id-ID') + '</div></div>';
    document.getElementById('statsRow').innerHTML = statsHTML;

    // Build table
    var h = "<table class='table-res'><thead><tr><th>#</th><th style='text-align:left;'>Nama</th><th>Hadir</th><th>NBM (Rp)</th></tr></thead><tbody>";
    keys.forEach(function (n, i) {
      h += "<tr><td style='color:#bbb;font-size:11px;'>" + (i+1) + "</td><td style='text-align:left;'>" + n + "</td><td>" + rekap[n].masuk + "</td><td>" + rekap[n].nbm.toLocaleString('id-ID') + "</td></tr>";
    });
    h += "</tbody><tfoot><tr><td colspan='3' style='text-align:right;'>TOTAL NBM</td><td>" + res.totalNBMAll.toLocaleString('id-ID') + "</td></tr></tfoot></table>";
    document.getElementById('hasilLaporan').innerHTML = h;

    document.getElementById('emptyCard').style.display = 'none';
    document.getElementById('hasilCard').style.display = 'block';
  }, function(err) {
    document.getElementById('emptyCard').querySelector('.laporan-empty').innerHTML =
      '<div class="laporan-empty-icon">❌</div><span style="color:red;font-size:13px;">Gagal memuat: ' + err.message + '</span>';
  });
}
</script>
</body>
</html>
